<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Game Gas Calculator | VegasInsider</title>
    <style>
        :root {
            --vi-gold: #ffcc00; --vi-black: #1a1a1a; --vi-dark-grey: #2d2d2d;
            --vi-white: #ffffff; --vi-green: #00c853;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: #0d0d0d;
            color: var(--vi-white); display: flex; justify-content: center; padding: 20px;
        }
        .calculator-card {
            background-color: var(--vi-black); border: 1px solid var(--vi-dark-grey);
            border-radius: 12px; width: 100%; max-width: 550px; padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .header { text-align: center; border-bottom: 2px solid var(--vi-gold); margin-bottom: 25px; padding-bottom: 15px; }
        .header h1 { margin: 0; font-size: 24px; text-transform: uppercase; font-weight: 900; line-height: 1.2; }
        .header h1 span { color: var(--vi-gold); }
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 11px; color: #999; text-transform: uppercase; font-weight: bold; }
        select, input { width: 100%; padding: 12px; background-color: var(--vi-dark-grey); border: 1px solid #444; color: white; border-radius: 4px; font-size: 15px; }
        .btn-calculate { width: 100%; padding: 18px; background-color: var(--vi-gold); color: black; border: none; border-radius: 4px; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .results { margin-top: 25px; display: none; background: #252525; padding: 20px; border-radius: 8px; border: 1px solid var(--vi-gold); }
        .main-stat { font-size: 36px; color: var(--vi-gold); font-weight: bold; text-align: center; margin: 10px 0; }
        .summary-box { display: flex; justify-content: space-around; border-top: 1px solid #444; padding-top: 15px; margin-top: 15px; }
        .summary-item { text-align: center; }
        .summary-item div:first-child { font-size: 10px; color: #888; text-transform: uppercase; }
        .summary-item div:last-child { font-size: 18px; font-weight: bold; color: var(--vi-green); }
        .disclaimer { font-size: 11px; color: #666; text-align: center; margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="header">
        <h1>How Much Will You Spend On Gas To See <span>The Big Game?</span></h1>
    </div>

    <div class="input-group">
        <label>Select Destination Stadium</label>
        <select id="stadiumSelect">
            <option value="">-- Select Stadium --</option>
            <option value="40.7505,-73.9934">Madison Square Garden (NYC)</option>
            <option value="34.043,-118.2673">Crypto.com Arena (LA)</option>
            <option value="41.8807,-87.6742">United Center (Chicago)</option>
            <option value="42.3662,-71.0621">TD Garden (Boston)</option>
            <option value="37.768,-122.3877">Chase Center (San Francisco)</option>
            <option value="32.7905,-96.8103">American Airlines Center (Dallas)</option>
            <option value="33.7573,-84.3963">Mercedes-Benz Stadium (Atlanta)</option>
            <option value="33.9535,-118.339">SoFi Stadium (Inglewood/LA)</option>
            <option value="32.7473,-97.0945">AT&T Stadium (Arlington/Dallas)</option>
            <option value="36.0909,-115.1833">Allegiant Stadium (Las Vegas)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Your Starting State</label>
        <select id="stateSelect" onchange="populateCities()">
            <option value="">Select State</option>
        </select>
    </div>

    <div class="input-group">
        <label>Your Home City</label>
        <select id="citySelect">
            <option value="">Select Home City</option>
        </select>
    </div>

    <div class="input-group">
        <label>Vehicle Type</label>
        <select id="vehicleType">
            <option value="30">Sedan / Compact (30 MPG)</option>
            <option value="22" selected>SUV / Crossover (22 MPG)</option>
            <option value="18">Minivan / Full-Size Truck (18 MPG)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Fans in Vehicle</label>
        <input type="number" id="fans" value="1" min="1">
    </div>

    <button class="btn-calculate" onclick="calculate()">Calculate Trip Cost</button>

    <div id="results" class="results">
        <div style="text-align: center; font-size: 12px; color: #aaa;">ESTIMATED TOTAL GAS COST</div>
        <div class="main-stat" id="totalCost">$0.00</div>
        <div class="summary-box">
            <div class="summary-item"><div>Split Per Fan</div><div id="perFan">$0.00</div></div>
            <div class="summary-item"><div>Best Price</div><div id="appliedPrice">$0.00</div></div>
            <div class="summary-item"><div>Total Miles</div><div id="totalMiles">0</div></div>
        </div>
        <p id="insight" style="font-size: 13px; color: #bbb; text-align: center; margin-top: 20px; line-height: 1.4; border-top: 1px solid #444; padding-top: 15px;"></p>
        <div class="disclaimer">*Note: Mileage is calculated as the direct distance between your home city and the stadium. Gas price shown is the cheapest in your city.</div>
    </div>
</div>

<script>
    // Database with coordinates for distance calculation
    const gasData = [
        {s:"Alabama", c:"birmingham", p:3.27, lat:33.5186, lon:-86.8104},
        {s:"Alabama", c:"mobile", p:3.27, lat:30.6954, lon:-88.0399},
        {s:"Arizona", c:"phoenix", p:3.44, lat:33.4484, lon:-112.074},
        {s:"California", c:"los-angeles", p:4.79, lat:34.0522, lon:-118.2437},
        {s:"Texas", c:"austin", p:2.89, lat:30.2672, lon:-97.7431},
        {s:"Texas", c:"dallas", p:2.99, lat:32.7767, lon:-96.7970}
        // Add more from your list here...
    ];

    const stateSet = [...new Set(gasData.map(item => item.s))].sort();
    const stateEl = document.getElementById('stateSelect');
    stateSet.forEach(s => {
        let opt = document.createElement('option'); opt.value = s; opt.innerText = s; stateEl.appendChild(opt);
    });

    function populateCities() {
        const state = stateEl.value;
        const cityEl = document.getElementById('citySelect');
        cityEl.innerHTML = '<option value="">Select Home City</option>';
        gasData.filter(i => i.s === state).forEach(i => {
            let opt = document.createElement('option');
            opt.value = `${i.p}|${i.lat}|${i.lon}`;
            opt.innerText = i.c.charAt(0).toUpperCase() + i.c.slice(1).replace(/-/g, ' ');
            cityEl.appendChild(opt);
        });
    }

    function calculate() {
        const stadiumVal = document.getElementById('stadiumSelect').value;
        const cityVal = document.getElementById('citySelect').value;
        const mpg = parseFloat(document.getElementById('vehicleType').value);
        const fans = parseFloat(document.getElementById('fans').value);

        if (!stadiumVal || !cityVal) { alert("Please select a stadium and city."); return; }

        const [sLat, sLon] = stadiumVal.split(',').map(Number);
        const [price, cLat, cLon] = cityVal.split('|').map(Number);

        // Haversine Formula for distance
        const R = 3958.8; // Earth radius in miles
        const dLat = (sLat - cLat) * Math.PI / 180;
        const dLon = (sLon - cLon) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(cLat * Math.PI/180) * Math.cos(sLat * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const distance = 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        const roundTrip = distance * 2 * 1.15; // 1.15 multiplier for actual road turns vs straight line

        const totalCost = (roundTrip / mpg) * price;

        document.getElementById('totalCost').innerText = '$' + totalCost.toFixed(2);
        document.getElementById('perFan').innerText = '$' + (totalCost/fans).toFixed(2);
        document.getElementById('appliedPrice').innerText = '$' + price.toFixed(2);
        document.getElementById('totalMiles').innerText = Math.round(roundTrip);
        document.getElementById('results').style.display = 'block';
    }
</script>
</body>
</html>
